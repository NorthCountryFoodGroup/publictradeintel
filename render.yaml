services:
  - type: web
    name: publictradeintel
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: ADMIN_PIN
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: POLICY_REFRESH_MS
        value: "3600000"

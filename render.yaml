services:
  - type: web
    name: publictradeintel
    runtime: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "node server.js"
    healthCheckPath: /healthz
    numInstances: 1
    disk:
      name: publictradeintel-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: DATA_DIR
        value: "/var/data"
      - key: DECISION_LAB_ENABLED
        value: "false"
      - key: V3_SHADOW_ENABLED
        value: "false"
      - key: PRODUCTION_ORDER_EXECUTION_ENABLED
        value: "false"
      - key: ADMIN_PIN
        sync: false
      - key: LOGIN_PIN
        sync: false
      - key: PORTFOLIO_PIN
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: CONGRESS_TRADES_FEED_URL
        sync: false
      - key: CONGRESS_TRADES_API_KEY
        sync: false
      - key: CONGRESS_REFRESH_MS
        value: "3600000"
      - key: POLICY_REFRESH_MS
        value: "3600000"
      - key: PREDICTION_REFRESH_MS
        value: "3600000"
